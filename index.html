<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工艺路线管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            color: #333;
        }
        /* 顶部导航栏 */
        .top-nav {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 600;
            color: #3498db;
        }
        .nav-left svg {
            width: 28px;
            height: 28px;
            fill: #3498db;
        }
        .nav-center {
            display: flex;
            gap: 32px;
        }
        .nav-center a {
            text-decoration: none;
            color: #666;
            font-size: 15px;
            padding: 8px 0;
            cursor: pointer;
        }
        .nav-center a:hover {
            color: #3498db;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3498db;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 主体布局 */
        .main-container {
            display: grid;
            grid-template-columns: 260px 1fr 320px;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 左侧工艺动作库 */
        .left-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 16px;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }
        .tab-item {
            padding: 8px 16px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-item.active {
            color: #3498db;
            border-bottom-color: #3498db;
            font-weight: 500;
        }
        .action-help {
            text-align: right;
            margin-bottom: 12px;
        }
        .help-btn {
            background: #f0f0f0;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }
        .action-library {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .action-item {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: move;
            transition: all 0.2s;
        }
        .action-item:hover {
            border-color: #3498db;
            background: #f8f9fa;
        }
        .action-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }
        .action-name {
            font-size: 13px;
            color: #333;
            margin-bottom: 4px;
        }
        .action-desc {
            font-size: 11px;
            color: #999;
        }
        .status-bar {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
        }

        /* 中间工艺路线创建 */
        .center-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        .product-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .required {
            color: #e74c3c;
        }
        .form-input {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
        }
        .form-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52,152,219,0.1);
        }
        .station-manage {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .station-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }
        .btn-add-station {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        .step-canvas {
            min-height: 300px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        .step-canvas-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .step-item {
            background: #f8f9fa;
            border: 1px solid #28a745;
            color: #28a745;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 8px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .del-step-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .current-station {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        .action-bar {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-warning {
            background: #fd7e14;
            color: #fff;
        }
        .btn-success {
            background: #28a745;
            color: #fff;
        }
        .btn-default {
            background: #6c757d;
            color: #fff;
        }

        /* 右侧工站属性 */
        .right-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
        }
        .attr-tab-header {
            display: flex;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }
        .attr-tab-item {
            padding: 8px 16px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .attr-tab-item.active {
            color: #3498db;
            border-bottom-color: #3498db;
            font-weight: 500;
        }
        .attr-content {
            display: none;
        }
        .attr-content.active {
            display: block;
        }
        .device-box {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
            margin-top: 8px;
        }
        .device-item {
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .device-item:last-child {
            border-bottom: none;
        }
        .del-device-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 底部状态栏 */
        .bottom-status {
            background: #fff;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .status-left {
            display: flex;
            gap: 24px;
        }
        .status-right {
            display: flex;
            gap: 16px;
        }

        /* Excel表格样式 */
        .excel-box {
            margin-top: 20px;
            overflow-x: auto;
        }
        .excel-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #ddd;
        }
        .excel-table th, .excel-table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
            font-size: 13px;
        }
        .excel-table th {
            background: #f1f3f5;
            font-weight: 500;
        }
        .copy-btn {
            margin-top: 10px;
            background: #28a745;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        /* 我的设计页面 */
        .design-page {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .design-item {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 16px;
            margin-bottom: 12px;
        }
        .design-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-nav">
    <div class="nav-left">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"></path></svg>
        <span>工艺路线管理系统</span>
    </div>
    <div class="nav-center">
        <a onclick="showPage('home')">🏠 首页</a>
        <a onclick="showPage('process')">工艺库</a>
        <a onclick="showPage('design')">我的设计</a>
        <a onclick="showPage('help')">❓ 帮助中心</a>
    </div>
    <div class="nav-right">
        <div class="avatar">IE</div>
        <div>
            <div>IE工程师</div>
            <div style="font-size:12px;color:#999">工艺设计部</div>
        </div>
    </div>
</div>

<!-- 主体内容 -->
<div id="home-page" class="main-container">
    <!-- 左侧工艺动作库 -->
    <div class="left-panel">
        <div class="tab-header">
            <div class="tab-item active" data-tab="action">工艺动作库</div>
            <div class="tab-item" data-tab="history">历史步骤</div>
        </div>
        <div class="action-help">
            <button class="help-btn">帮助</button>
        </div>
        <div class="action-library" id="actionLibrary">
            <div class="action-item" draggable="true" data-name="自检">
                <div class="action-icon" style="background:#9b59b6;">✓</div>
                <div class="action-name">自检</div>
                <div class="action-desc">自主检查作业质量</div>
            </div>
            <div class="action-item" draggable="true" data-name="插线">
                <div class="action-icon" style="background:#3498db;">🔌</div>
                <div class="action-name">插线</div>
                <div class="action-desc">连接插头和接口</div>
            </div>
            <div class="action-item" draggable="true" data-name="理线">
                <div class="action-icon" style="background:#3498db;">🧵</div>
                <div class="action-name">理线</div>
                <div class="action-desc">整理和布置线路</div>
            </div>
            <div class="action-item" draggable="true" data-name="扣合">
                <div class="action-icon" style="background:#27ae60;">🔗</div>
                <div class="action-name">扣合</div>
                <div class="action-desc">组装和扣合零件</div>
            </div>
            <div class="action-item" draggable="true" data-name="锁付">
                <div class="action-icon" style="background:#f39c12;">🔧</div>
                <div class="action-name">锁付</div>
                <div class="action-desc">使用螺丝组件</div>
            </div>
            <div class="action-item" draggable="true" data-name="贴付">
                <div class="action-icon" style="background:#e74c3c;">🏷️</div>
                <div class="action-name">贴付</div>
                <div class="action-desc">贴标签、贴外等</div>
            </div>
            <div class="action-item" draggable="true" data-name="打胶">
                <div class="action-icon" style="background:#8e44ad;">💧</div>
                <div class="action-name">打胶</div>
                <div class="action-desc">涂胶作业</div>
            </div>
            <div class="action-item" draggable="true" data-name="外观">
                <div class="action-icon" style="background:#16a085;">👁️</div>
                <div class="action-name">外观</div>
                <div class="action-desc">外观检查</div>
            </div>
            <div class="action-item" draggable="true" data-name="包装">
                <div class="action-icon" style="background:#e67e22;">📦</div>
                <div class="action-name">包装</div>
                <div class="action-desc">产品包装</div>
            </div>
        </div>
        <div class="status-bar">
            <span class="status-dot"></span>
            <span id="localStatus">未保存</span>
        </div>
    </div>

    <!-- 中间工艺路线创建 -->
    <div class="center-panel">
        <div class="section-title">工艺路线创建</div>
        <div class="product-info">
            <div class="form-group">
                <label class="form-label">产品名称<span class="required">*</span></label>
                <input type="text" id="productName" class="form-input" placeholder="例如：无线蓝牙耳机">
            </div>
            <div class="form-group">
                <label class="form-label">产品代码<span class="required">*</span></label>
                <input type="text" id="productCode" class="form-input" placeholder="例如：BT-2024-001">
            </div>
        </div>
        <div class="station-manage">
            <div class="station-title">工站管理</div>
            <button class="btn-add-station" onclick="addNewStation()">+ 添加工站</button>
        </div>
        <div class="form-group" style="max-width: 300px;">
            <label class="form-label">选择工站</label>
            <select id="stationSelect" class="form-input" onchange="switchStation()"></select>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn btn-default" onclick="renameStation()">工站改名</button>
                <button class="btn btn-danger" onclick="deleteCurrentStation()">删除工站</button>
                <button class="btn btn-warning" onclick="saveCurrentToDesign()">单独保存此工站</button>
            </div>
        </div>
        <div class="current-station">当前工站: <span id="currentStationName" style="color:#e74c3c;">未选择</span></div>
        <div class="step-canvas" id="stepCanvas">
            <svg class="step-canvas-icon" viewBox="0 0 24 24" fill="#999">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"></path>
            </svg>
            <div><strong>请先选择一个工站</strong></div>
            <div style="font-size:13px;margin-top:8px;">选择一个工站后，从左侧拖拽步骤到这里</div>
        </div>
        <div class="action-bar">
            <button class="btn btn-default" onclick="clearCurrentStationSteps()">清空步骤</button>
            <button class="btn btn-success" onclick="saveAllToExcelAndDesign()">📥 一键保存全部到Excel+我的设计</button>
        </div>
        <div id="excelOutputArea" class="excel-box" style="display:none;">
            <h4 style="margin-bottom:10px;">✅ Excel 工艺总表（可直接复制粘贴）</h4>
            <table id="excelTable" class="excel-table"></table>
            <button class="copy-btn" onclick="copyExcel()">复制表格</button>
        </div>
    </div>

    <!-- 右侧工站属性 -->
    <div class="right-panel">
        <div class="attr-tab-header">
            <div class="attr-tab-item active" data-tab="station">工站属性</div>
            <div class="attr-tab-item" data-tab="step">步骤属性</div>
        </div>
        <div class="attr-content active" id="station-attr">
            <div class="form-group">
                <label class="form-label">工站名称<span class="required">*</span></label>
                <input type="text" id="stationName" class="form-input" placeholder="例如：主板组装工站">
            </div>
            <div class="form-group">
                <label class="form-label">工序编号</label>
                <input type="text" id="processNo" class="form-input" placeholder="例如：S001">
            </div>
            <div class="form-group">
                <label class="form-label">作业人数</label>
                <input type="number" id="workNum" class="form-input" value="1" min="1">
            </div>
            <div class="form-group">
                <label class="form-label">版本</label>
                <input type="text" id="version" class="form-input" value="V1.0">
            </div>
            <div class="form-group">
                <label class="form-label">制定日期</label>
                <input type="date" id="createDate" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">设备工装</label>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="deviceInput" class="form-input" placeholder="设备/工装名称">
                    <button class="btn btn-primary" onclick="addDevice()">添加</button>
                </div>
                <div class="device-box" id="deviceList"></div>
            </div>
        </div>
        <div class="attr-content" id="step-attr">
            <div style="color:#999;font-size:14px;">选择步骤后可编辑属性</div>
        </div>
    </div>
</div>

<!-- 我的设计页面 -->
<div id="design-page" class="design-page">
    <h2 style="margin-bottom:20px;">我的设计</h2>
    <button class="btn btn-primary" onclick="refreshMyDesign()">刷新列表</button>
    <div id="designList" style="margin-top:16px;"></div>
</div>

<!-- 底部状态栏 -->
<div class="bottom-status">
    <div class="status-left">
        <span>当前产品: <span id="bottomProduct">未设置</span></span>
        <span>工站数量: <span id="bottomStationCount">0</span></span>
    </div>
    <div class="status-right">
        <span>步骤总数: <span id="bottomStepCount">0</span></span>
    </div>
</div>

<script>
const STORAGE_KEY = 'process_final_ui_match';
let systemData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    product: { name: '', code: '' },
    stations: [],
    currentStationId: '',
    actions: ["自检","插线","理线","扣合","锁付","贴付","打胶","外观","包装"],
    myDesign: []
};

let dragName = '';
let currentDeviceList = [];

// 页面切换
function showPage(page) {
    document.getElementById('home-page').style.display = page === 'home' ? 'grid' : 'none';
    document.getElementById('design-page').style.display = page === 'design' ? 'block' : 'none';
    if (page === 'design') refreshMyDesign();
}

// 保存到本地
function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(systemData));
    updateStatus();
}

// 更新状态栏
function updateStatus() {
    document.getElementById('bottomProduct').textContent = systemData.product.name || '未设置';
    document.getElementById('bottomStationCount').textContent = systemData.stations.length;
    let totalSteps = 0;
    systemData.stations.forEach(s => totalSteps += s.steps.length);
    document.getElementById('bottomStepCount').textContent = totalSteps;
    document.getElementById('localStatus').textContent = '已保存';
}

// 拖拽初始化
function initDrag() {
    document.querySelectorAll('.action-item').forEach(item => {
        item.ondragstart = e => { dragName = item.dataset.name; };
    });
    const canvas = document.getElementById('stepCanvas');
    canvas.ondragover = e => e.preventDefault();
    canvas.ondrop = e => {
        e.preventDefault();
        if (!systemData.currentStationId) return alert('请先选择工站');
        addStep(dragName);
    };
}

// 工站管理
function addNewStation() {
    const today = new Date().toISOString().split('T')[0];
    const station = {
        id: 'S' + Date.now(), name: '', processNo: '', workNum: 1,
        version: 'V1.0', createDate: today, steps: [], deviceList: []
    };
    systemData.stations.push(station);
    systemData.currentStationId = station.id;
    save();
    renderStationSelect();
    document.getElementById('stationSelect').value = station.id;
    switchStation();
}
function renderStationSelect() {
    const sel = document.getElementById('stationSelect');
    sel.innerHTML = '<option value="">--请选择工站--</option>';
    systemData.stations.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name || '未命名工站';
        if (s.id === systemData.currentStationId) opt.selected = true;
        sel.appendChild(opt);
    });
}
function switchStation() {
    const id = document.getElementById('stationSelect').value;
    if (!id) {
        systemData.currentStationId = '';
        document.getElementById('currentStationName').textContent = '未选择';
        document.getElementById('stepCanvas').innerHTML = `
            <svg class="step-canvas-icon" viewBox="0 0 24 24" fill="#999">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"></path>
            </svg>
            <div><strong>请先选择一个工站</strong></div>
            <div style="font-size:13px;margin-top:8px;">选择一个工站后，从左侧拖拽步骤到这里</div>
        `;
        return;
    }
    const st = systemData.stations.find(s => s.id === id);
    systemData.currentStationId = id;
    document.getElementById('currentStationName').textContent = st.name || '未命名工站';
    document.getElementById('stationName').value = st.name || '';
    document.getElementById('processNo').value = st.processNo || '';
    document.getElementById('workNum').value = st.workNum || 1;
    document.getElementById('version').value = st.version || 'V1.0';
    document.getElementById('createDate').value = st.createDate;
    currentDeviceList = [...st.deviceList];
    renderDeviceList();
    renderSteps(st.steps);
    save();
}
function renameStation() {
    const id = systemData.currentStationId;
    if (!id) return alert('请选择工站');
    const st = systemData.stations.find(s => s.id === id);
    const newName = prompt('输入新工站名称：', st.name);
    if (!newName) return;
    st.name = newName;
    save();
    renderStationSelect();
    document.getElementById('currentStationName').textContent = newName;
}
function deleteCurrentStation() {
    if (!systemData.currentStationId || !confirm('确定删除当前工站？')) return;
    systemData.stations = systemData.stations.filter(s => s.id !== systemData.currentStationId);
    systemData.currentStationId = '';
    save();
    renderStationSelect();
    switchStation();
}

// 步骤管理
function renderSteps(steps) {
    const canvas = document.getElementById('stepCanvas');
    if (steps.length === 0) {
        canvas.innerHTML = `
            <svg class="step-canvas-icon" viewBox="0 0 24 24" fill="#999">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"></path>
            </svg>
            <div><strong>请先选择一个工站</strong></div>
            <div style="font-size:13px;margin-top:8px;">选择一个工站后，从左侧拖拽步骤到这里</div>
        `;
        return;
    }
    let html = '';
    steps.forEach(s => {
        html += `<div class="step-item">
            <span>${s}</span>
            <button class="del-step-btn" onclick="delStep('${s}')">×</button>
        </div>`;
    });
    canvas.innerHTML = html;
}
function addStep(name) {
    const st = systemData.stations.find(s => s.id === systemData.currentStationId);
    if (st.steps.includes(name)) return alert('该步骤已存在');
    st.steps.push(name);
    renderSteps(st.steps);
    save();
}
function delStep(name) {
    const st = systemData.stations.find(s => s.id === systemData.currentStationId);
    st.steps = st.steps.filter(s => s !== name);
    renderSteps(st.steps);
    save();
}
function clearCurrentStationSteps() {
    if (!systemData.currentStationId || !confirm('确定清空当前工站步骤？')) return;
    const st = systemData.stations.find(s => s.id === systemData.currentStationId);
    st.steps = [];
    renderSteps(st.steps);
    save();
}

// 设备管理
function addDevice() {
    const v = document.getElementById('deviceInput').value.trim();
    if (!v) return;
    currentDeviceList.push(v);
    renderDeviceList();
    document.getElementById('deviceInput').value = '';
    saveAttr();
}
function renderDeviceList() {
    const box = document.getElementById('deviceList');
    box.innerHTML = '';
    currentDeviceList.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = 'device-item';
        div.innerHTML = `
            <span>${d}</span>
            <button class="del-device-btn" onclick="delDevice(${i})">删</button>
        `;
        box.appendChild(div);
    });
}
function delDevice(idx) {
    currentDeviceList.splice(idx, 1);
    renderDeviceList();
    saveAttr();
}

// 保存工站属性
function saveAttr() {
    const st = systemData.stations.find(s => s.id === systemData.currentStationId);
    if (!st) return;
    st.name = document.getElementById('stationName').value.trim();
    st.processNo = document.getElementById('processNo').value.trim();
    st.workNum = +document.getElementById('workNum').value || 1;
    st.version = document.getElementById('version').value.trim();
    st.createDate = document.getElementById('createDate').value;
    st.deviceList = [...currentDeviceList];
    save();
    renderStationSelect();
    document.getElementById('currentStationName').textContent = st.name || '未命名工站';
}

// 单独保存当前工站到我的设计
function saveCurrentToDesign() {
    saveAttr();
    const id = systemData.currentStationId;
    if (!id) return alert('请先选择工站');
    const st = systemData.stations.find(s => s.id === id);
    const now = new Date().toLocaleString();
    systemData.myDesign.unshift({
        type: 'single',
        product: {
            name: document.getElementById('productName').value || '未命名',
            code: document.getElementById('productCode').value || '无代码'
        },
        station: JSON.parse(JSON.stringify(st)),
        time: now
    });
    save();
    alert('✅ 已单独保存当前工站到我的设计！');
}

// 一键保存全部 + Excel
function saveAllToExcelAndDesign() {
    saveAttr();
    const pn = document.getElementById('productName').value || '未命名产品';
    const pc = document.getElementById('productCode').value || '无代码';
    const now = new Date().toLocaleString();

    // 保存到我的设计
    systemData.myDesign.unshift({
        type: 'all',
        product: { name: pn, code: pc },
        stations: JSON.parse(JSON.stringify(systemData.stations)),
        time: now
    });
    save();

    // 生成Excel表格
    const table = document.getElementById('excelTable');
    table.innerHTML = `
    <tr>
        <th>序号</th>
        <th>产品名称</th>
        <th>产品代码</th>
        <th>工站名称</th>
        <th>工序编号</th>
        <th>工艺流程</th>
        <th>设备工装</th>
        <th>作业人数</th>
        <th>版本</th>
    </tr>`;

    systemData.stations.forEach((st, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${pn}</td>
        <td>${pc}</td>
        <td>${st.name || ''}</td>
        <td>${st.processNo || ''}</td>
        <td>${st.steps.join(' → ')}</td>
        <td>${(st.deviceList || []).join('，')}</td>
        <td>${st.workNum || 1}</td>
        <td>${st.version || 'V1.0'}</td>`;
        table.appendChild(tr);
    });

    document.getElementById('excelOutputArea').style.display = 'block';
    alert('✅ 已一键保存全部工站到我的设计，并生成Excel表格！');
}

// 复制Excel表格
function copyExcel() {
    const range = document.createRange();
    range.selectNode(document.getElementById('excelTable'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert('✅ 已复制表格，可直接粘贴到Excel！');
}

// 我的设计列表
function refreshMyDesign() {
    const box = document.getElementById('designList');
    box.innerHTML = '';
    if (systemData.myDesign.length === 0) {
        box.innerHTML = '<p style="color:#999;">暂无保存记录</p>';
        return;
    }
    systemData.myDesign.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'design-item';
        let html = `
            <h4 style="margin:0 0 8px 0;">${item.product.name}（${item.product.code}）</h4>
            <p class="design-time">保存时间：${item.time}</p>
            <p style="margin:8px 0;">类型：${item.type === 'single' ? '单个工站' : '全部工站'}</p>
            <button class="btn btn-danger btn-sm" onclick="delDesign(${i})">删除</button>
            <hr style="margin:12px 0;border:none;border-top:1px solid #eee;">
        `;
        if (item.type === 'single') {
            html += `<p style="margin:4px 0;">工站：${item.station.name || '无'}</p>`;
            html += `<p style="margin:4px 0;">流程：${item.station.steps.join(' → ')}</p>`;
        } else {
            item.stations.forEach(s => {
                html += `<p style="margin:4px 0;">【${s.name}】${s.steps.join(' → ')}</p>`;
            });
        }
        div.innerHTML = html;
        box.appendChild(div);
    });
}
function delDesign(index) {
    if (!confirm('确定删除该设计记录？')) return;
    systemData.myDesign.splice(index, 1);
    save();
    refreshMyDesign();
}

// 标签页切换
document.querySelectorAll('.tab-item').forEach(item => {
    item.onclick = function() {
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
    };
});
document.querySelectorAll('.attr-tab-item').forEach(item => {
    item.onclick = function() {
        document.querySelectorAll('.attr-tab-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.attr-content').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.dataset.tab + '-attr').classList.add('active');
    };
});

// 初始化
window.onload = function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('createDate').value = today;
    systemData.product.name = document.getElementById('productName').value;
    systemData.product.code = document.getElementById('productCode').value;
    initDrag();
    renderStationSelect();
    updateStatus();
};
</script>
</body>
</html>
