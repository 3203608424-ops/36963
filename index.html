<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工艺路线管理 - 最终稳定版</title>
<style>
  *{box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif;}
  body{background:#f5f7fa;padding:20px;margin:0;}
  .container{max-width:1000px;margin:0 auto;background:#fff;border-radius:8px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  .nav{margin-bottom:20px;}
  .nav button{padding:8px 16px;margin-right:8px;border:none;border-radius:4px;cursor:pointer;}
  .btn-primary{background:#3498db;color:white;}
  .btn-success{background:#28a745;color:white;}
  .btn-warning{background:#fd7e14;color:white;}
  .btn-danger{background:#dc3545;color:white;}
  .btn-default{background:#6c757d;color:white;}
  .section{display:none;}
  .section.active{display:block;}
  input,select,textarea{width:100%;padding:8px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;}
  .station-box{margin-bottom:12px;}
  .step-item{padding:6px 10px;background:#f8f9fa;border-radius:4px;margin-bottom:6px;}
  .design-item{padding:12px;background:#f8f9fa;border-radius:6px;margin-bottom:10px;}
  .design-item h4{margin:0 0 4px 0;font-size:14px;}
  .design-item p{margin:0 0 4px 0;font-size:13px;color:#333;}
  .design-item .time{font-size:12px;color:#999;}
  .excel-table{width:100%;border-collapse:collapse;margin-top:20px;}
  .excel-table th,.excel-table td{border:1px solid #ddd;padding:8px;text-align:left;font-size:14px;}
  .excel-table th{background:#f1f3f5;}
</style>
</head>
<body>

<div class="container">
  <div class="nav">
    <button class="btn btn-primary" onclick="showPage('edit')">工艺编辑</button>
    <button class="btn btn-default" onclick="showPage('mydesign')">我的设计</button>
  </div>

  <!-- 编辑页面 -->
  <div id="edit" class="section active">
    <h3>产品信息</h3>
    <input id="productName" placeholder="产品名称">
    <input id="productCode" placeholder="产品代码">

    <h3>工站管理</h3>
    <div class="station-box">
      <select id="stationSelect" onchange="loadCurrentStation()"></select>
      <button class="btn btn-default" onclick="addStation()">新增工站</button>
      <button class="btn btn-danger" onclick="deleteStation()">删除工站</button>
    </div>

    <input id="stationName" placeholder="工站名称" oninput="autoSaveAttr()">
    <input id="processNo" placeholder="工序编号" oninput="autoSaveAttr()">
    <input id="version" value="V1.0" placeholder="版本" oninput="autoSaveAttr()">

    <h4>工艺流程步骤</h4>
    <div id="stepList"></div>
    <button class="btn btn-default" onclick="addNewStep()">添加步骤</button>

    <div style="margin-top:20px;">
      <button class="btn btn-warning" onclick="saveSingleToMyDesign()">单独保存此工站到我的设计</button>
      <button class="btn btn-success" onclick="saveAllToMyDesign()">一键保存全部工站到我的设计</button>
    </div>

    <div style="margin-top:12px;">
      <button class="btn btn-success" onclick="exportCurrentStationToExcel()">导出当前工站Excel</button>
      <button class="btn btn-primary" onclick="exportAllStationToExcel()">导出全部工站Excel</button>
    </div>

    <div id="excelPreview" style="margin-top:20px;"></div>
  </div>

  <!-- 我的设计 -->
  <div id="mydesign" class="section">
    <h3>我的设计</h3>
    <div id="designList"></div>
  </div>
</div>

<script>
const KEY = 'PROCESS_FINAL_SAFE';
let gData = JSON.parse(localStorage.getItem(KEY)) || {
  product: { name: '', code: '' },
  stations: [],
  currentStationId: '',
  myDesign: []
};

let stationSteps = [];

// 页面切换
function showPage(page) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  if (page === 'mydesign') renderMyDesign();
}

// 保存到本地
function saveData() {
  localStorage.setItem(KEY, JSON.stringify(gData));
}

// 工站
function addStation() {
  const id = 'S' + Date.now();
  const station = {
    id, name: '', processNo: '', version: 'V1.0',
    steps: [], deviceList: []
  };
  gData.stations.push(station);
  gData.currentStationId = id;
  saveData();
  renderStationSelect();
  loadCurrentStation();
}

function renderStationSelect() {
  const sel = document.getElementById('stationSelect');
  sel.innerHTML = '<option value="">--选择工站--</option>';
  gData.stations.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name || '未命名工站';
    if (s.id === gData.currentStationId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function loadCurrentStation() {
  const id = document.getElementById('stationSelect').value;
  if (!id) return;
  gData.currentStationId = id;
  const st = gData.stations.find(s => s.id === id);
  if (!st) return;
  document.getElementById('stationName').value = st.name || '';
  document.getElementById('processNo').value = st.processNo || '';
  document.getElementById('version').value = st.version || 'V1.0';
  stationSteps = [...st.steps];
  renderSteps();
  saveData();
}

function autoSaveAttr() {
  const id = gData.currentStationId;
  if (!id) return;
  const st = gData.stations.find(s => s.id === id);
  if (!st) return;
  st.name = document.getElementById('stationName').value.trim();
  st.processNo = document.getElementById('processNo').value.trim();
  st.version = document.getElementById('version').value.trim();
  st.steps = [...stationSteps];
  saveData();
  renderStationSelect();
}

function deleteStation() {
  const id = gData.currentStationId;
  if (!id) return;
  gData.stations = gData.stations.filter(s => s.id !== id);
  gData.currentStationId = '';
  saveData();
  renderStationSelect();
  document.getElementById('stationName').value = '';
  document.getElementById('processNo').value = '';
  stationSteps = [];
  renderSteps();
}

// 步骤
function renderSteps() {
  const box = document.getElementById('stepList');
  box.innerHTML = '';
  stationSteps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = `${s} <button onclick="delStep(${i})" style="float:right;border:none;background:transparent;cursor:pointer;color:red">×</button>`;
    box.appendChild(div);
  });
}

function addNewStep() {
  const val = prompt('输入步骤内容');
  if (val) {
    stationSteps.push(val);
    renderSteps();
    autoSaveAttr();
  }
}

function delStep(index) {
  stationSteps.splice(index, 1);
  renderSteps();
  autoSaveAttr();
}

// ========== 保存到我的设计（带时间） ==========
function saveSingleToMyDesign() {
  autoSaveAttr();
  const id = gData.currentStationId;
  if (!id) return alert('请选择工站');
  const st = gData.stations.find(s => s.id === id);
  const now = new Date().toLocaleString();

  gData.myDesign.unshift({
    type: 'single',
    product: {
      name: document.getElementById('productName').value || '未命名',
      code: document.getElementById('productCode').value || '无代码'
    },
    station: JSON.parse(JSON.stringify(st)),
    time: now
  });

  saveData();
  alert('已单独保存到我的设计！');
}

function saveAllToMyDesign() {
  autoSaveAttr();
  const now = new Date().toLocaleString();
  gData.myDesign.unshift({
    type: 'all',
    product: {
      name: document.getElementById('productName').value || '未命名产品',
      code: document.getElementById('productCode').value || '无代码'
    },
    stations: JSON.parse(JSON.stringify(gData.stations)),
    time: now
  });
  saveData();
  alert('已保存全部工站到我的设计！');
}

// ========== 我的设计列表 ==========
function renderMyDesign() {
  const box = document.getElementById('designList');
  box.innerHTML = '';
  if (gData.myDesign.length === 0) {
    box.innerHTML = '<p>暂无保存记录</p>';
    return;
  }
  gData.myDesign.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'design-item';
    let html = `
      <h4>${item.product.name}（${item.product.code}）</h4>
      <p class="time">保存时间：${item.time}</p>
      <p>类型：${item.type === 'single' ? '单个工站' : '全部工站'}</p>
      <button class="btn btn-danger btn-sm" onclick="delDesign(${idx})">删除</button>
      <hr style="margin:6px 0">
    `;
    if (item.type === 'single') {
      html += `<p>工站：${item.station.name || '无'}</p>`;
      html += `<p>流程：${item.station.steps.join(' → ')}</p>`;
    } else {
      item.stations.forEach(s => {
        html += `<p>【${s.name}】${s.steps.join(' → ')}</p>`;
      });
    }
    div.innerHTML = html;
    box.appendChild(div);
  });
}

function delDesign(index) {
  gData.myDesign.splice(index, 1);
  saveData();
  renderMyDesign();
}

// ========== Excel导出 ==========
function exportCurrentStationToExcel() {
  autoSaveAttr();
  const id = gData.currentStationId;
  if (!id) return alert('请选择工站');
  const st = gData.stations.find(s => s.id === id);
  const pn = document.getElementById('productName').value || '未命名';
  const pc = document.getElementById('productCode').value || '无代码';

  let html = `<table class="excel-table">
    <tr><th>产品</th><th>代码</th><th>工站</th><th>工序号</th><th>流程</th><th>版本</th></tr>
    <tr>
      <td>${pn}</td>
      <td>${pc}</td>
      <td>${st.name}</td>
      <td>${st.processNo}</td>
      <td>${st.steps.join(' → ')}</td>
      <td>${st.version}</td>
    </tr>
  </table>`;
  document.getElementById('excelPreview').innerHTML = html;
}

function exportAllStationToExcel() {
  autoSaveAttr();
  const pn = document.getElementById('productName').value || '未命名产品';
  const pc = document.getElementById('productCode').value || '无代码';

  let html = `<table class="excel-table">
    <tr><th>序号</th><th>产品</th><th>代码</th><th>工站</th><th>工序号</th><th>流程</th><th>版本</th></tr>`;

  gData.stations.forEach((st, i) => {
    html += `
    <tr>
      <td>${i + 1}</td>
      <td>${pn}</td>
      <td>${pc}</td>
      <td>${st.name}</td>
      <td>${st.processNo}</td>
      <td>${st.steps.join(' → ')}</td>
      <td>${st.version}</td>
    </tr>`;
  });

  html += '</table>';
  document.getElementById('excelPreview').innerHTML = html;
}

// 初始化
window.onload = function () {
  renderStationSelect();
  loadCurrentStation();
};
</script>
</body>
</html>
